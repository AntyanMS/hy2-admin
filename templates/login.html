<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Вход — HY2 Admin</title>
  <style>
    :root {
      --bg: #0a0c10;
      --card: #171a21;
      --text: #e6e6e6;
      --muted: #9ca3af;
      --border: #2a2f3a;
      --btn: #2563eb;
      --btn-hover: #1d4ed8;
      --err: #f87171;
      --ok: #4ade80;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      min-height: 100%;
      height: 100%;
      overflow: hidden;
      font-family: system-ui, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
    }
    #login-bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      width: 100%;
      height: 100%;
      display: block;
      pointer-events: none;
    }
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      z-index: 1;
    }
    .card {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 380px;
      margin: 16px;
      padding: 28px 24px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: rgba(23, 26, 33, 0.92);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.45);
    }
    h1 { margin: 0 0 18px; font-size: 1.15rem; font-weight: 700; }
    .login-form {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .login-form input {
      width: 100%;
      margin: 0;
      padding: 12px 14px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: #0b0d12;
      color: var(--text);
      font-size: 1rem;
    }
    .login-form input::placeholder {
      color: #6b7280;
      opacity: 1;
    }
    .login-form button {
      width: 100%;
      margin: 4px 0 0;
      padding: 11px;
      border: 0;
      border-radius: 8px;
      font-weight: 700;
      font-size: 0.95rem;
      cursor: pointer;
      background: var(--btn);
      color: #fff;
    }
    .login-form button:hover { background: var(--btn-hover); }
    .err { color: var(--err); font-size: 0.88rem; margin: 0 0 10px; }
    .ok { color: var(--ok); font-size: 0.88rem; margin: 0 0 10px; }
  </style>
</head>
<body>
  <canvas id="login-bg" aria-hidden="true"></canvas>
  <div class="card">
    <h1>Вход в панель</h1>
    {% if error %}<p class="err">{{ error }}</p>{% endif %}
    {% if request.args.get('updated') == '1' %}
    <p class="ok">Логин и пароль панели обновлены. Войдите снова с новым паролем.</p>
    {% endif %}
    <form class="login-form" method="post" action="{{ url_for('hy2.login') }}" autocomplete="off">
      <input type="hidden" name="next" value="{{ next_path }}" />
      <input type="hidden" name="csrf" value="{{ csrf }}" />
      <input id="u" name="user" type="text" required autocomplete="username" value="{{ default_user or '' }}" placeholder="Login" aria-label="Логин" />
      <input id="p" name="password" type="password" required autocomplete="current-password" placeholder="Password" aria-label="Пароль" />
      {% if totp_required|default(false) %}
      <input id="t" name="totp" type="text" inputmode="numeric" pattern="[0-9 ]*" maxlength="12" autocomplete="one-time-code" placeholder="2FA code" aria-label="Код 2FA" />
      {% else %}
      <input type="hidden" name="totp" value="" />
      {% endif %}
      <button type="submit">Войти</button>
    </form>
  </div>
  <script>
(function () {
  var canvas = document.getElementById("login-bg");
  if (!canvas || !canvas.getContext) return;
  var ctx = canvas.getContext("2d");
  var dpr = Math.min(window.devicePixelRatio || 1, 2);
  var w, h, t0 = performance.now();
  var pts = [];

  function buildPts() {
    var n = Math.min(90, Math.floor((w * h) / 18000) + 30);
    pts = [];
    for (var i = 0; i < n; i++) {
      pts.push({
        x: Math.random() * w,
        y: Math.random() * h,
        vx: (Math.random() - 0.5) * 0.35,
        vy: (Math.random() - 0.5) * 0.35,
        r: Math.random() * 1.2 + 0.3
      });
    }
  }

  function resize() {
    w = window.innerWidth;
    h = window.innerHeight;
    canvas.width = Math.floor(w * dpr);
    canvas.height = Math.floor(h * dpr);
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    buildPts();
  }
  window.addEventListener("resize", resize);
  resize();

  function tick(now) {
    var t = (now - t0) * 0.001;
    ctx.fillStyle = "#0a0c10";
    ctx.fillRect(0, 0, w, h);

    ctx.strokeStyle = "rgba(55, 65, 81, 0.35)";
    ctx.lineWidth = 1;
    var step = 48;
    var gx, gy;
    for (gx = (t * 12) % step; gx < w + step; gx += step) {
      ctx.beginPath();
      ctx.moveTo(gx, 0);
      ctx.lineTo(gx, h);
      ctx.stroke();
    }
    for (gy = (t * 8) % step; gy < h + step; gy += step) {
      ctx.beginPath();
      ctx.moveTo(0, gy);
      ctx.lineTo(w, gy);
      ctx.stroke();
    }

    for (var i = 0; i < pts.length; i++) {
      var p = pts[i];
      p.x += p.vx;
      p.y += p.vy;
      if (p.x < 0 || p.x > w) p.vx *= -1;
      if (p.y < 0 || p.y > h) p.vy *= -1;
    }

    var maxD = 100;
    var a, b, dx, dy, d, alpha;
    for (a = 0; a < pts.length; a++) {
      for (b = a + 1; b < pts.length; b++) {
        dx = pts[a].x - pts[b].x;
        dy = pts[a].y - pts[b].y;
        d = Math.sqrt(dx * dx + dy * dy);
        if (d < maxD) {
          alpha = (1 - d / maxD) * 0.22;
          ctx.strokeStyle = "rgba(148, 163, 184, " + alpha + ")";
          ctx.beginPath();
          ctx.moveTo(pts[a].x, pts[a].y);
          ctx.lineTo(pts[b].x, pts[b].y);
          ctx.stroke();
        }
      }
    }

    for (var k = 0; k < pts.length; k++) {
      var q = pts[k];
      ctx.fillStyle = "rgba(226, 232, 240, 0.55)";
      ctx.beginPath();
      ctx.arc(q.x, q.y, q.r, 0, Math.PI * 2);
      ctx.fill();
    }

    requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);
})();
  </script>
</body>
</html>
