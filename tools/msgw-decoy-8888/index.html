<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex, nofollow" />
  <title>MSGW</title>
  <style>
    html, body { margin: 0; height: 100%; background: #0a0c10; overflow: hidden; }
    canvas { display: block; width: 100%; height: 100%; }
  </style>
</head>
<body>
  <canvas id="c" aria-hidden="true"></canvas>
  <script>
(function () {
  var canvas = document.getElementById("c");
  var ctx = canvas.getContext("2d");
  var dpr = Math.min(window.devicePixelRatio || 1, 2);
  var w, h, t0 = performance.now();

  function resize() {
    w = window.innerWidth;
    h = window.innerHeight;
    canvas.width = Math.floor(w * dpr);
    canvas.height = Math.floor(h * dpr);
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  window.addEventListener("resize", resize);
  resize();

  var n = Math.min(90, Math.floor((w * h) / 18000) + 30);
  var pts = [];
  for (var i = 0; i < n; i++) {
    pts.push({
      x: Math.random() * w,
      y: Math.random() * h,
      vx: (Math.random() - 0.5) * 0.35,
      vy: (Math.random() - 0.5) * 0.35,
      r: Math.random() * 1.2 + 0.3
    });
  }

  function tick(now) {
    var t = (now - t0) * 0.001;
    ctx.fillStyle = "#0a0c10";
    ctx.fillRect(0, 0, w, h);

    ctx.strokeStyle = "rgba(55, 65, 81, 0.35)";
    ctx.lineWidth = 1;
    var step = 48;
    for (var gx = (t * 12) % step; gx < w + step; gx += step) {
      ctx.beginPath();
      ctx.moveTo(gx, 0);
      ctx.lineTo(gx, h);
      ctx.stroke();
    }
    for (var gy = (t * 8) % step; gy < h + step; gy += step) {
      ctx.beginPath();
      ctx.moveTo(0, gy);
      ctx.lineTo(w, gy);
      ctx.stroke();
    }

    for (var i = 0; i < pts.length; i++) {
      var p = pts[i];
      p.x += p.vx;
      p.y += p.vy;
      if (p.x < 0 || p.x > w) p.vx *= -1;
      if (p.y < 0 || p.y > h) p.vy *= -1;
    }

    var maxD = 100;
    for (var a = 0; a < pts.length; a++) {
      for (var b = a + 1; b < pts.length; b++) {
        var dx = pts[a].x - pts[b].x;
        var dy = pts[a].y - pts[b].y;
        var d = Math.sqrt(dx * dx + dy * dy);
        if (d < maxD) {
          var alpha = (1 - d / maxD) * 0.22;
          ctx.strokeStyle = "rgba(148, 163, 184, " + alpha + ")";
          ctx.beginPath();
          ctx.moveTo(pts[a].x, pts[a].y);
          ctx.lineTo(pts[b].x, pts[b].y);
          ctx.stroke();
        }
      }
    }

    for (var k = 0; k < pts.length; k++) {
      var q = pts[k];
      ctx.fillStyle = "rgba(226, 232, 240, 0.55)";
      ctx.beginPath();
      ctx.arc(q.x, q.y, q.r, 0, Math.PI * 2);
      ctx.fill();
    }

    var msg = "Service temporarily overloaded";
    var fs = Math.max(15, Math.min(22, Math.min(w, h) * 0.04));
    ctx.font = "600 " + fs + "px system-ui, -apple-system, Segoe UI, sans-serif";
    var tw = ctx.measureText(msg).width;
    var padX = 22;
    var padY = 14;
    var bx = w / 2 - tw / 2 - padX;
    var by = h / 2 - fs / 2 - padY;
    var bw = tw + padX * 2;
    var bh = fs + padY * 2;
    ctx.fillStyle = "rgba(15, 23, 42, 0.82)";
    ctx.beginPath();
    var r = 10;
    ctx.moveTo(bx + r, by);
    ctx.lineTo(bx + bw - r, by);
    ctx.quadraticCurveTo(bx + bw, by, bx + bw, by + r);
    ctx.lineTo(bx + bw, by + bh - r);
    ctx.quadraticCurveTo(bx + bw, by + bh, bx + bw - r, by + bh);
    ctx.lineTo(bx + r, by + bh);
    ctx.quadraticCurveTo(bx, by + bh, bx, by + bh - r);
    ctx.lineTo(bx, by + r);
    ctx.quadraticCurveTo(bx, by, bx + r, by);
    ctx.closePath();
    ctx.fill();
    ctx.strokeStyle = "rgba(148, 163, 184, 0.35)";
    ctx.lineWidth = 1;
    ctx.stroke();

    ctx.fillStyle = "#e2e8f0";
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    ctx.fillText(msg, w / 2, h / 2);

    requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);
})();
  </script>
</body>
</html>
