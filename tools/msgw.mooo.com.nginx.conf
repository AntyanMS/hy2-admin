# Один файл для msgw.mooo.com:
# — HTTPS :443 — заглушка на /; панель по секретному пути → loopback 8787.
#   Сегмент пути совпадает с PANEL_URL_PREFIX в /opt/hy2-admin/.env. Автообновление: PANEL_NGINX_SITE_PATH=/etc/nginx/sites-available/msgw.mooo.com
#   Пример URL: https://msgw.mooo.com/<hex>/panel/
# — HTTPS :8443 — редирект 301 на тот же путь на :443 (старые ссылки).
#
# Каталог заглушки: /var/www/msgw-https-root (tools/msgw-https-root-stub/index.html).

server {
    listen 0.0.0.0:443 ssl;
    server_name msgw.mooo.com;

    ssl_certificate /etc/letsencrypt/live/msgw.mooo.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/msgw.mooo.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    ssl_prefer_server_ciphers off;

    location = /favicon.ico {
        return 204;
        access_log off;
    }

    location = /a6a693f09b142be07883d332b3f608ef83f9eb428e27031b5231c3593174862d/panel {
        return 301 https://$host/a6a693f09b142be07883d332b3f608ef83f9eb428e27031b5231c3593174862d/panel/;
    }

    location /a6a693f09b142be07883d332b3f608ef83f9eb428e27031b5231c3593174862d/panel/ {
        proxy_set_header X-Hy2-Legacy-Basic "";
        proxy_pass http://127.0.0.1:8787;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_read_timeout 120s;
        proxy_buffering off;
    }

    location / {
        root /var/www/msgw-https-root;
        index index.html;
        try_files $uri $uri/ /index.html;
    }
}

server {
    listen 0.0.0.0:8443 ssl;
    server_name msgw.mooo.com;

    ssl_certificate /etc/letsencrypt/live/msgw.mooo.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/msgw.mooo.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    return 301 https://$host$request_uri;
}
