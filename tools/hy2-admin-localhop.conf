# Локальный вход в панель без публичного DNS (обход предупреждения Safe Browsing в Chrome).
# На ПК: ssh -N -L 17777:127.0.0.1:17777 msgwnnl
# Браузер: http://127.0.0.1:17777/225fb1e928c6ad0254929f8ef1afee1d/panel/login
server {
    listen 127.0.0.1:17777;
    server_name localhost;

    location /225fb1e928c6ad0254929f8ef1afee1d/panel/ {
        proxy_set_header X-Hy2-Legacy-Basic "";
        proxy_set_header Authorization $http_authorization;
        proxy_pass http://127.0.0.1:8787;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto http;
        proxy_set_header Connection "";
        proxy_read_timeout 120s;
        proxy_buffering off;
    }

    location = / {
        return 302 /225fb1e928c6ad0254929f8ef1afee1d/panel/login;
    }
}
