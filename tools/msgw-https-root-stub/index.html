<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>msgw.mooo.com</title>
  <style>
    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; overflow: hidden; font-family: system-ui, "Segoe UI", sans-serif; }
    #bg {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
      z-index: 0;
      pointer-events: none;
    }
    .layer {
      position: relative;
      z-index: 1;
      min-height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 28px 20px;
    }
    .card {
      max-width: 420px;
      text-align: center;
      padding: 32px 28px;
      border-radius: 16px;
      border: 1px solid rgba(148, 163, 184, 0.2);
      background: rgba(15, 17, 23, 0.55);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      box-shadow:
        0 24px 80px rgba(0, 0, 0, 0.45),
        inset 0 1px 0 rgba(255, 255, 255, 0.06);
    }
    h1 {
      margin: 0 0 12px;
      font-size: 1.35rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      background: linear-gradient(120deg, #e2e8f0 0%, #94a3b8 45%, #cbd5e1 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    p {
      margin: 0;
      font-size: 0.95rem;
      line-height: 1.55;
      color: rgba(148, 163, 184, 0.95);
    }
  </style>
</head>
<body>
  <canvas id="bg" aria-hidden="true"></canvas>
  <div class="layer">
    <div class="card">
      <h1>Server temporarily overloaded</h1>
      <p>
        The origin host is running under high load or maintenance. Please try again in a few minutes.
      </p>
    </div>
  </div>
  <script>
(function () {
  var canvas = document.getElementById("bg");
  if (!canvas || !canvas.getContext) return;
  var ctx = canvas.getContext("2d");
  var dpr = Math.min(window.devicePixelRatio || 1, 2);
  var w, h, t0 = performance.now();
  var pts = [];

  function buildPts() {
    var n = Math.min(96, Math.floor((w * h) / 16000) + 36);
    pts = [];
    for (var i = 0; i < n; i++) {
      pts.push({
        x: Math.random() * w,
        y: Math.random() * h,
        vx: (Math.random() - 0.5) * 0.32,
        vy: (Math.random() - 0.5) * 0.32,
        r: Math.random() * 1.35 + 0.25
      });
    }
  }

  function resize() {
    w = window.innerWidth;
    h = window.innerHeight;
    canvas.width = Math.floor(w * dpr);
    canvas.height = Math.floor(h * dpr);
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    buildPts();
  }
  window.addEventListener("resize", resize);
  resize();

  function tick(now) {
    var t = (now - t0) * 0.001;
    var g = ctx.createLinearGradient(0, 0, w, h);
    g.addColorStop(0, "#070a10");
    g.addColorStop(0.45, "#0c1020");
    g.addColorStop(1, "#080c14");
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, w, h);

    var cx = w * (0.5 + 0.08 * Math.sin(t * 0.35));
    var cy = h * (0.45 + 0.06 * Math.cos(t * 0.28));
    var rg = ctx.createRadialGradient(cx, cy, 0, cx, cy, Math.max(w, h) * 0.55);
    rg.addColorStop(0, "rgba(59, 130, 246, 0.09)");
    rg.addColorStop(0.45, "rgba(99, 102, 241, 0.05)");
    rg.addColorStop(1, "rgba(0,0,0,0)");
    ctx.fillStyle = rg;
    ctx.fillRect(0, 0, w, h);

    ctx.strokeStyle = "rgba(51, 65, 85, 0.38)";
    ctx.lineWidth = 1;
    var step = 52;
    var gx, gy;
    for (gx = (t * 10) % step; gx < w + step; gx += step) {
      ctx.beginPath();
      ctx.moveTo(gx, 0);
      ctx.lineTo(gx, h);
      ctx.stroke();
    }
    for (gy = (t * 6.5) % step; gy < h + step; gy += step) {
      ctx.beginPath();
      ctx.moveTo(0, gy);
      ctx.lineTo(w, gy);
      ctx.stroke();
    }

    var i, p;
    for (i = 0; i < pts.length; i++) {
      p = pts[i];
      p.x += p.vx;
      p.y += p.vy;
      if (p.x < 0 || p.x > w) p.vx *= -1;
      if (p.y < 0 || p.y > h) p.vy *= -1;
    }

    var maxD = 108;
    var a, b, dx, dy, d, alpha;
    for (a = 0; a < pts.length; a++) {
      for (b = a + 1; b < pts.length; b++) {
        dx = pts[a].x - pts[b].x;
        dy = pts[a].y - pts[b].y;
        d = Math.sqrt(dx * dx + dy * dy);
        if (d < maxD) {
          alpha = (1 - d / maxD) * 0.2;
          ctx.strokeStyle = "rgba(148, 163, 184, " + alpha + ")";
          ctx.beginPath();
          ctx.moveTo(pts[a].x, pts[a].y);
          ctx.lineTo(pts[b].x, pts[b].y);
          ctx.stroke();
        }
      }
    }

    for (i = 0; i < pts.length; i++) {
      p = pts[i];
      ctx.fillStyle = "rgba(226, 232, 240, 0.5)";
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fill();
    }

    requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);
})();
  </script>
</body>
</html>
